<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="site-nav">
    <a href="/">Home</a>
  </nav>

  <main>
    <article class="post">
      <header class="post-header">
        <h1>{{title}}</h1>
        <div class="post-meta">
          <time>{{date}}</time>
          <div class="post-tags">{{tags}}</div>
        </div>
      </header>
      <div class="post-content">
        {{content}}
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026</p>
  </footer>
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "6ff4eb01c5c240a9a66b89e9b08cf2a2"}'></script>
</body>
</html>
